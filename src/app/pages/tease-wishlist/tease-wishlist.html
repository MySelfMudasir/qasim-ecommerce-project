
<div appViewPanel class="grid md:grid-cols-[1fr_auto] md:items-center gap-4">
    <div class="grid grid-cols-[auto_1fr] items-start sm:items-center gap-3">
        <mat-icon class="!text-red-500">favorite_border</mat-icon>
        <div>
            <h2 class="text-xl font-bold">
                wishlist ({{ store.wishlistCount() }})
            </h2>
            <p class="text-gray-500 text-sm">You have ({{ store.wishlistCount() }}) items saved for later</p>
        </div>
    </div>
    <div class="grid sm:grid-cols-2 sm:gap-3 md:justify-self-end gap-2">
        <button matButton routerLink="/wishlist" class="w-full sm:w-auto">View All</button>
        <button matButton="filled" class="flex w-full items-center justify-center gap-2 sm:w-auto" (click)="store.addAllWishlistToCart()">
            <mat-icon>shopping_cart</mat-icon>
            Add All to Cart
        </button>
    </div>
</div>
