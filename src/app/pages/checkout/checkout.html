<div class="mx-auto max-w-[1200px] py-6">
    <app-back-button class="mb-6 block" navigateTo="/cart">Back to Cart</app-back-button>
  <h1 class="text-3xl font-extrabold mb-4">Checkout</h1>

  <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
    <div class="md:col-span-3 flex flex-col gap-6">
      <div>
        <app-shipping-form></app-shipping-form>
        <app-payment-form class="mx-4"></app-payment-form>
      </div>
    </div>

    <div class="md:col-span-2">
      <app-summarize-order>
        <ng-container actionButtons>
          @for (item of store.cartItems(); track item.product.id) {
            <div class="flex text-sm justify-between">
              <span>{{ item.product.name }} x {{ item.quantity }}</span>
              <span>{{ (item.product.price * item.quantity) | currency }}</span>
            </div>
            
          }
        </ng-container>

        <ng-container actionButtons>
          <button matButton="filled" class="w-full mt-6 py-3"
            [disabled]="store.loading()"  
            (click)="store.placeOrder()">
            {{ store.loading() ? 'Processing...' : 'Place Order' }}
          </button>
        </ng-container>
        
      </app-summarize-order>
    </div>
  </div>
</div>
