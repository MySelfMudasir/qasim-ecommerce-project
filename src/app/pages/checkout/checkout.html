<div class="mx-auto w-full max-w-300 px-4 py-6 sm:px-6 lg:px-8">
  <app-back-button class="mb-6 block" navigateTo="/cart">Back to Cart</app-back-button>

  <div class="mb-6 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-3xl font-extrabold">Checkout</h1>
      <p class="mt-1 text-sm text-slate-500">Select how you want to receive your order.</p>
    </div>

    <button type="button" (click)="toggleCheckoutMode()" mat-stroked-button class="flex items-center gap-2">
      <mat-icon>swap_horiz</mat-icon>
      Switch to {{ isDeliveryMode ? 'Collection' : 'Delivery' }}
    </button>
  </div>

  <form (ngSubmit)="submitCheckout()" class="grid grid-cols-1 gap-6 lg:grid-cols-5">
    <div class="lg:col-span-3 flex flex-col gap-6">

      <!-- ── DELIVERY ──────────────────────────────────────────────────── -->
      @if (isDeliveryMode) {
        <section class="rounded-xl border border-slate-200 p-6">
          <div class="flex items-center gap-2 mb-4">
            <mat-icon>local_shipping</mat-icon>
            <h2 class="text-2xl font-bold">Shipping Information</h2>
          </div>
          <app-shipping-form [group]="shippingGroup"></app-shipping-form>
        </section>

      <!-- ── COLLECTION ────────────────────────────────────────────────── -->
      } @else {
        <section class="rounded-xl border border-slate-200 p-6">
          <div class="flex items-center gap-2 mb-4">
            <mat-icon>storefront</mat-icon>
            <h2 class="text-2xl font-bold">Collection Details</h2>
          </div>

          <div class="grid gap-4">
            <!-- Read-only location -->
            <mat-form-field appearance="outline" class="w-full">
              <mat-label>Location</mat-label>
              <input matInput [value]="defaultLocation" readonly>
            </mat-form-field>

            <!-- Date & Time side by side on md+ -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <app-collection-date [control]="collectionDateControl"></app-collection-date>
              <app-collection-time [control]="collectionTimeControl"></app-collection-time>
            </div>
          </div>
        </section>
      }

      <!-- ── PAYMENT ────────────────────────────────────────────────────── -->
      <section class="rounded-xl border border-slate-200 p-6" [formGroup]="checkoutForm">
        <h2 class="text-xl font-bold mb-4">Payment</h2>
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Payment Method</mat-label>
          <mat-select formControlName="paymentMethod">
            <mat-option value="cashOnDelivery">Cash on Delivery</mat-option>
            <mat-option value="creditCard">Credit Card</mat-option>
          </mat-select>
        </mat-form-field>
      </section>
    </div>

    <!-- ── ORDER SUMMARY ─────────────────────────────────────────────────── -->
    <div class="lg:col-span-2">
      <app-summarize-order>
        <ng-container actionButtons>
          <button mat-flat-button color="primary"
            class="mt-6 w-full py-6 text-lg"
            type="submit"
            [disabled]="store.loading() || (isDeliveryMode ? shippingGroup.invalid : collectionGroup.invalid)">
            {{ store.loading() ? 'Processing...' : 'Place Order' }}
          </button>
        </ng-container>
      </app-summarize-order>
    </div>
  </form>
</div>
