@if(inStock()) {
    <div class="flex items-center gap-2 rounded-lg px-3 py-3 w-full" style="background-color: var(--app-bg); color: var(--app-text-success); border: 2px solid var(--app-border-success)">
        <mat-icon class="small">check_circle</mat-icon>
        <span class="text-xs" style="color: var(--app-text-muted)">In Stock and ready to ship</span>
    </div>
}
@else {
    <div class="flex items-center gap-2 rounded-lg px-3 py-3 w-full" style="background-color: var(--app-bg); color: var(--app-text-danger); border: 2px solid var(--app-border-danger)">
        <mat-icon class="small">warning</mat-icon>
        <span class="text-xs" style="color: var(--app-text-muted)">This item is currently out of stock. Add it to your wishlist to be notified when it's available again.</span>
    </div>
}
