<div class="flex flex-col items-center justify-center py-16 text-center">

    <!-- Heart Icon -->
    <div class="w-20 h-20 mb-8 rounded-full flex items-center justify-center" style="background-color: var(--app-bg);">
        <mat-icon class="transform scale-150" style="color: var(--app-text);">error</mat-icon>
    </div>

    <!-- Message -->
    <h2 class="text-2xl font-bold mb-3" style="color: var(--app-text);">Page Not Found</h2>
    <p class="mb-8" style="color: var(--app-text-muted);">The page you are looking for does not exist.</p>

    <!-- Start Shopping Button -->
    <button matButton="filled" matTooltip="Start Shopping" routerLink="/products/all" class="min-w-[200px] py-3">Start
        Shopping</button>
</div>
