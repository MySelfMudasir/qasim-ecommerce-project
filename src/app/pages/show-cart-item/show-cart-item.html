<div class="grid grid-cols-2 gap-x-4 gap-y-5 sm:grid-cols-3 sm:items-center">
    <div class="col-span-2 flex items-center gap-4 sm:col-span-1">
        <img [src]="item().product.imageUrl"
             class="w-20 h-20 sm:w-24 sm:h-24 rounded-lg object-cover"
             [style.view-transition-name]="'product-image-' + item().product.id">
        <div class="min-w-0">
            <div class="text-xs sm:text-sm md:text-lg line-clamp-1 font-semibold" style="color: var(--app-text);">
                {{ item().product.name }}
            </div>
            <div class="text-sm sm:text-base md:text-lg font-bold" style="color: var(--app-text-muted);">
                ${{ item().product.price }}
            </div>
        </div>
    </div>

    <div class="col-span-1 flex items-center justify-start sm:justify-center">
        <app-quantity-selector
            [quantity]="item().quantity"
            (quantityUpdate)="store.setItemQuantity({ productId: item().product.id, quantity: $event})">
        </app-quantity-selector>
    </div>

    <div class="col-span-1 flex flex-col items-end justify-center gap-2 sm:items-end">
        <div class="text-right font-semibold text-base sm:text-lg">
            ${{ total() }}
        </div>
        <div class="flex justify-end -me-2 sm:-me-3">
            <button matIconButton (click)="store.moveToWishlist(item().product)">
                <mat-icon>favorite_border</mat-icon>
            </button>
            <button matIconButton class="danger" (click)="store.removeFromCart(item().product)">
                <mat-icon>delete</mat-icon>
            </button>
        </div>
    </div>
</div>
