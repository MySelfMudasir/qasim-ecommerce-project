<div class="flex justify-center items-center h-[calc(100vh-64px)] py-6">
    <div class="flex flex-col items-center justify-center text-center rounded-xl shadow p-8 gap-6 max-w-[400px]"
        style="background-color: var(--app-bg)">
        <mat-icon role="img"
            class="mat-icon notranslate !text-green-500 !h-[56px] !w-[56px] !text-[56px] material-icons mat-ligature-font mat-icon-no-color"
            aria-hidden="true" data-mat-icon-type="font">check_circle</mat-icon>
        <h2 class="font-semibold text-green-600 text-2xl font-bold">Account Created Successfully</h2>
        <p class="text-base"> Thank you for creating an account with us! </p>
        <p class="" style="color: var(--app-text-muted)">
            You will receive an email confirmation shortly with your account details.
        </p>
        <button matButton="filled" color="primary" (click)="openSignInDialog()"
            class="mdc-button mat-mdc-button-base w-full max-w-xs mt-2 mdc-button--unelevated mat-mdc-unelevated-button mat-primary"
            mat-ripple-loader-class-name="mat-mdc-button-ripple"><span
                class="mat-mdc-button-persistent-ripple mdc-button__ripple"></span><span class="mdc-button__label">
                Continue Sign In </span><span class="mat-focus-indicator"></span><span
                class="mat-mdc-button-touch-target"></span><span
                class="mat-ripple mat-mdc-button-ripple"></span></button>
    </div>
</div>
