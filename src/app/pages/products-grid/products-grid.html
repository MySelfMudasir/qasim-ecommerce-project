<mat-sidenav-container class="h-full">
  <mat-sidenav 
  [mode]="sidenavService.mode()" 
  [opened]="sidenavService.opened()">
    <div class="p-6">
      <h2 class="text-lg text-gray-900">Categories</h2>

      <mat-nav-list>
        @for (cat of categoriesList(); track cat) {
        <mat-list-item class="my-2" [activated]="cat === selectedCategory()" [routerLink]="['/products', cat]">
          <span matListItemTitle class="font-medium" [class]="cat === selectedCategory() ? '!text-white' : null">{{
            cat
            | titlecase }}</span>
        </mat-list-item>
        }
      </mat-nav-list>

    </div>
  </mat-sidenav>
  <mat-sidenav-content class="bg-gray-100 p-6 h-full">


    <app-menu-bar></app-menu-bar>

    <div appViewPanel class="mb-4">
      <app-carousel [slides]="mySlides" [config]="carouselConfig"></app-carousel>
    </div>

    <div appViewPanel class="mb-4">
      <app-carousel2></app-carousel2>
    </div>

    <div class="bg-gray-100 p-6 h-full">
      <h1 class="text-2xl font-bold text-gray-900">{{ selectedCategory() | titlecase }}</h1>
      <p class="text-base text-gray-600 mb-6">{{ store.filteredProducts().length }} products found</p>
      <div class="responsive-grid">
        @for (product of store.filteredProducts(); track product.id) {
        <app-product-card [product]="product">
          <app-toggle-wishlist-button class="!absolute top-3 right-3" [product]="product"
            [style.view-transition-name]="'wishlist-button-' + product.id">
          </app-toggle-wishlist-button>
        </app-product-card>
        }
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
