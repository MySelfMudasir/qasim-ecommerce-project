<div class="flex flex-col items-center justify-center py-16 text-center">
    
    <!-- Heart Icon -->
    <div class="w-20 h-20 mb-8 rounded-full flex items-center justify-center" style="background-color: var(--app-bg);">
        <mat-icon class="transform scale-150" style="color: var(--app-text);">favorite_border</mat-icon>
    </div>
    
    <!-- Message -->
    <h2 class="text-2xl font-bold mb-3" style="color: var(--app-text);">Your wishlist is empty</h2>
    <p class="mb-8" style="color: var(--app-text-muted);">Save items you love for later!</p>

    <!-- Start Shopping Button -->
    <button matButton="filled" routerLink="/products/all" class="min-w-[200px] py-3">Start Shopping</button>
</div>
