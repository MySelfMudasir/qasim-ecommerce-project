<div appViewPanel>
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Customer Reviews</h2>
        @if (store.user()) {
            <button matButton="filled" class="" (click)="store.showWriteReview()">Write a Review</button>
        }
    </div>

    @if(store.writeReview()) {
        <app-write-review class="mb-6" ></app-write-review>
        <div class="text-center py-10" style="color: var(--app-text-muted)">
            <p class="text-lg">No reviews yet. Be the first to review this product!</p>
        </div>
    } 

    <app-rating-summary [product]="product()"></app-rating-summary>
    <div class="flex flex-col gap-6">
            @for (review of sortedReviews(); track review.id) {
                <app-view-review-item [review]="review"></app-view-review-item>
            }
    </div>
</div>
