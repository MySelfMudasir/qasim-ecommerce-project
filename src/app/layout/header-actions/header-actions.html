<div class="flex items-center">


  <div class="flex items-center gap-2 md:gap-4">

    <!-- Wishlist -->
    <button matIconButton routerLink="/wishlist" [matBadge]="store.wishlistCount()"
      [matBadgeHidden]="store.wishlistCount() === 0">
      <mat-icon>favorite</mat-icon>
    </button>

    <!-- Cart -->
    <button matIconButton routerLink="/cart" [matBadge]="store.cartCount()" [matBadgeHidden]="store.cartCount() === 0">
      <mat-icon>shopping_cart</mat-icon>
    </button>

    @if(store.user(); as user) {
    <button matIconButton [matMenuTriggerFor]="userMenu">
      <img [src]="user.imageUrl" loading="lazy" [alt]="user.name" class="w-8 h-8 rounded-full" />
    </button>
    <mat-menu #userMenu="matMenu" xPosition="before">
      <div class="flex flex-col px-3 min-w-[200px]">
        <span class="text-sm font-medium">{{ user.name }}</span>
        <span class="text-xs">{{ user.email }}</span>
      </div>
      <mat-divider></mat-divider>
      <button class="!min-h-[32px]" mat-menu-item (click)="store.signOut()">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
    </mat-menu>
    }
    @else {

    <!-- Hidden on mobile -->
    <div class="hidden md:inline">
      <button matButton class="hidden md:inline" (click)="openSignInDialog()">
        Sign In
      </button>

      <button matButton="filled" class="hidden md:inline" (click)="openSignUpDialog()">
        Sign Up
      </button>
    </div>
    }


  </div>

  <div class="md:flex-1 md:justify-center md:px-4">
    <app-theme-button></app-theme-button>
  </div>




</div>
