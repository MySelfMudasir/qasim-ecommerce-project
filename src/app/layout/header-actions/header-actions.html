<div class="flex items-center gap-2">
  <button matIconButton class="example-icon favorite-icon" aria-label="Example icon-button with heart icon"
    routerLink="/wishlist" [matBadge]="store.wishlistCount()" [matBadgeHidden]="store.wishlistCount() === 0">
    <mat-icon>favorite</mat-icon>
  </button>
  <button matIconButton class="example-icon" aria-label="Example icon-button with share icon" routerLink="/cart"
    [matBadge]="store.cartCount()" [matBadgeHidden]="store.cartCount() === 0">
    <mat-icon>shopping_cart</mat-icon>
  </button>

  @if(store.user(); as user) {
  <button matIconButton [matMenuTriggerFor]="userMenu">
    <img [src]="user.imageUrl" [alt]="user.name" class="w-8 h-8 rounded-full" />
  </button>
  <mat-menu #userMenu="matMenu" xPosition="before">
    <div class="flex flex-col px-3 min-w-[200px]">
      <span class="text-sm font-medium">{{ user.name }}</span>
      <span class="text-xs">{{ user.email }}</span>
    </div>
    <mat-divider></mat-divider>
    <button class="!min-h-[32px]" mat-menu-item (click)="store.signOut()">
      <mat-icon>logout</mat-icon>
      <span>Sign Out</span>
    </button>
  </mat-menu>
  }
  @else {

  <button matButton (click)="openSignInDialog()">Sign In</button>
  <button matButton="filled" (click)="openSignUpDialog()">Sign Up</button>
  }



  <button matIconButton disabled="false" (click)="toggleTheme()" aria-label="Toggle theme">
    <mat-icon>
      {{ isDark ? 'light_mode' : 'dark_mode' }}
    </mat-icon>
  </button>


</div>
