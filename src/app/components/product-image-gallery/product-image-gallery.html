<div class="product-gallery">
    <!-- Main Image Display -->
    <div class="main-image-container relative rounded-lg overflow-hidden">
        <img [src]="currentImage()" [alt]="productName()" loading="lazy" onerror="this.onerror=null; this.src='./assets/images/image-404.jpg'"
            class="w-full h-80 sm:h-105 lg:h-137.5 object-cover cursor-pointer transition-opacity hover:opacity-90"
            (click)="openLightbox(selectedImageIndex())" />

        <!-- View Full Screen Button -->
        <button type="button" class="gallery-control-button absolute top-3 right-3 p-2 rounded-lg transition-all"
            (click)="openLightbox(selectedImageIndex())" title="View full screen">
            <mat-icon>fullscreen</mat-icon>
        </button>

        <!-- Previous Button (shown only if multiple images) -->
        <button *ngIf="displayImages().length > 1" type="button"
            class="gallery-control-button absolute left-2 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-all"
            (click)="previousImage()" title="Previous image">
            <mat-icon>chevron_left</mat-icon>
        </button>

        <!-- Next Button (shown only if multiple images) -->
        <button *ngIf="displayImages().length > 1" type="button"
            class="gallery-control-button absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-all"
            (click)="nextImage()" title="Next image">
            <mat-icon>chevron_right</mat-icon>
        </button>

        <!-- Image Counter -->
        <div *ngIf="displayImages().length > 1"
            class="gallery-counter absolute bottom-3 left-3 px-3 py-1 rounded text-sm font-bold">
            {{ selectedImageIndex() + 1 }} / {{ displayImages().length }}
        </div>
    </div>

    <!-- Thumbnail Strip (shown only if multiple images) -->
    <div *ngIf="displayImages().length > 1" class="thumbnail-strip mt-4">
        <div class="flex gap-2 overflow-x-auto pb-2">
            <button *ngFor="let img of displayImages(); let i = index" type="button" (click)="selectImage(i)"
                [class.active]="selectedImageIndex() === i"
                class="thumbnail-button shrink-0 w-16 h-16 sm:w-20 sm:h-20 rounded-lg overflow-hidden border-2 transition-all"
                [class.active]="selectedImageIndex() === i">
                <img [src]="img" [alt]="productName() + ' - Image ' + (i + 1)" onerror="this.onerror=null; this.src='./assets/images/image-404.jpg'"
                    class="w-full h-full object-cover hover:opacity-80 transition-opacity" loading="lazy" />
            </button>
        </div>
    </div>
</div>
