<div class="animate-pulse rounded-xl shadow-md overflow-hidden flex flex-col h-full"
     style="background-color: var(--app-surface)">

    <!-- Image (same as aspect-square) -->
    <div class="w-full aspect-square bg-gray-300"></div>

    <div class="p-3 md:p-4 flex flex-col flex-1 space-y-2 md:space-y-3">

        <!-- Title -->
        <div class="h-3 md:h-5 bg-gray-300 rounded w-3/4"></div>

        <!-- Description (hidden on mobile like real card) -->
        <div class="hidden md:flex flex-col gap-2">
            <div class="h-4 bg-gray-300 rounded w-full"></div>
            <div class="h-4 bg-gray-300 rounded w-5/6"></div>
        </div>

        <!-- Rating -->
        <div class="h-3 md:h-4 bg-gray-300 rounded w-1/3"></div>

        <!-- Stock (hidden on mobile) -->
        <div class="hidden md:block h-3 bg-gray-300 rounded w-1/4"></div>

        <!-- Bottom section -->
        <div class="mt-auto flex flex-col gap-3">

            <!-- Price -->
            <div class="h-5 md:h-6 bg-gray-300 rounded w-1/3"></div>

            <!-- Button -->
            <div class="h-9 md:h-10 bg-gray-300 rounded w-full"></div>

        </div>

    </div>
</div>
