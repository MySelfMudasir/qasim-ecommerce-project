  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    .dark-theme #global-loader {
      background: #121212;
    }
  </style>

  <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const supportDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Decide if we should be dark
        const isDark = theme === 'dark-theme' || (!theme && supportDark);

        // Apply to documentElement (html tag) immediately
        document.documentElement.classList.toggle('dark-theme', isDark);
        document.documentElement.classList.toggle('light-theme', !isDark);

        // Optional: Set a meta theme-color for mobile browsers
        const meta = document.createElement('meta');
        meta.name = "theme-color";
        meta.content = isDark ? '#121212' : '#f5f5f5';
        document.head.appendChild(meta);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <!-- GLOBAL LOADER (shows instantly) -->
  <div id="global-loader">
    <img src="./icons/loading.svg" alt="Loading Khyber Foods..." width="80" />
  </div>
  <app-root></app-root>
</body>
